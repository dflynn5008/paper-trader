name: Paper Trader Daily Report

on:
  schedule:
    # Every day at 22:00 UTC (~6 PM Eastern) — end-of-day summary on Discord
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore stock portfolio state
        uses: actions/cache/restore@v4
        with:
          path: state
          key: paper-trader-portfolio-state
          restore-keys: |
            paper-trader-portfolio-state

      - name: Restore crypto portfolio state
        uses: actions/cache/restore@v4
        with:
          path: state
          key: paper-trader-crypto-portfolio-state
          restore-keys: |
            paper-trader-crypto-portfolio-state

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily Discord report
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ALPACA_PAPER: "true"
        run: python run_report.py
